# Render Blueprint — connect this repo at https://dashboard.render.com/blueprints
services:
  - type: web
    name: soccer-under-strategy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: API_FOOTBALL_KEY
        sync: false